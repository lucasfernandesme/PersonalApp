<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PersonalFlow App</title>

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PersonalFlow">
  <link rel="icon" href="/logo9.png">
  <link rel="apple-touch-icon" href="/logo9.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-zinc-50 text-zinc-900 overflow-x-hidden">
  <script>
    window.addEventListener('error', function (e) {
      const root = document.getElementById('root');
      if (root && root.innerHTML.trim() === '') {
        document.body.innerHTML =
          '<div style="background:#ef4444;color:white;padding:24px;font-family:system-ui;position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">' +
          '<h1 style="font-size:24px;font-weight:bold;margin-bottom:16px">Erro de Inicialização</h1>' +
          '<p style="margin-bottom:8px">O aplicativo não conseguiu carregar. Verifique as configurações.</p>' +
          '<pre style="background:rgba(0,0,0,0.2);padding:16px;border-radius:8px;overflow:auto;max-width:90%;text-align:left;font-family:monospace;margin-top:16px">' + (e.message || 'Erro desconhecido') + '</pre>' +
          '</div>';
      }
    });
  </script>
  <div id="root">
    <!-- Static Loading Screen (visible until React mounts) -->
    <div id="initial-loader"
      style="position:fixed;inset:0;background:#09090b;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,-apple-system,sans-serif">
      <div style="position:relative">
        <div class="pulse"
          style="position:absolute;inset:0;background:white;border-radius:9999px;filter:blur(40px);opacity:0.05">
        </div>
        <img src="/logo10.png" class="pulse" style="width:128px;height:128px;object-fit:contain;position:relative">
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
